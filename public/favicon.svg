<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#004494;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#002c61;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="ticket-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff8933;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#cc5600;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="ball-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bg)" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>

  <!-- Ticket body (rotated 0 degrees, centered) -->
  <g transform="translate(100,100) rotate(-10)" filter="url(#shadow)">
    <!-- Main ticket rectangle -->
    <rect x="-60" y="-28" width="120" height="56" rx="8" ry="8" fill="url(#ticket-grad)"/>

    <!-- Ticket perforated line -->
    <line x1="-20" y1="-28" x2="-20" y2="28" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" stroke-dasharray="4,3"/>

    <!-- Left stub -->
    <rect x="-60" y="-28" width="40" height="56" rx="8" ry="8" fill="rgba(0,0,0,0.12)"/>

    <!-- Notch top-left stub -->
    <circle cx="-20" cy="-28" r="6" fill="#002c61"/>
    <circle cx="-20" cy="28" r="6" fill="#002c61"/>

    <!-- Ticket text lines on main body -->
    <rect x="-12" y="-16" width="56" height="5" rx="2" fill="rgba(255,255,255,0.7)"/>
    <rect x="-12" y="-6" width="40" height="3.5" rx="1.5" fill="rgba(255,255,255,0.35)"/>
    <rect x="-12" y="4" width="48" height="3.5" rx="1.5" fill="rgba(255,255,255,0.35)"/>
    <rect x="-12" y="14" width="34" height="3.5" rx="1.5" fill="rgba(255,255,255,0.35)"/>

    <!-- Star on stub -->
    <text x="-40" y="-4" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.85)" font-family="sans-serif">★</text>
    <rect x="-52" y="6" width="24" height="3" rx="1.5" fill="rgba(255,255,255,0.3)"/>
    <rect x="-52" y="12" width="18" height="3" rx="1.5" fill="rgba(255,255,255,0.3)"/>
  </g>

  <!-- Football overlay (shifted up-right) -->
  <g transform="translate(118, 68)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="22" fill="url(#ball-grad)" stroke="#cccccc" stroke-width="1"/>
    <!-- Pentagon patches (simplified) -->
    <polygon points="0,-10 8.5,-4 5.2,7 -5.2,7 -8.5,-4" fill="#111" opacity="0.85"/>
    <polygon points="0,-22 6,-14 0,-10 -6,-14" fill="#111" opacity="0.6"/>
    <polygon points="8.5,-4 18,-7 20,2 12,8 5.2,7" fill="#111" opacity="0.5"/>
    <polygon points="-8.5,-4 -18,-7 -20,2 -12,8 -5.2,7" fill="#111" opacity="0.5"/>
    <polygon points="5.2,7 12,8 8,19 0,22 -8,19 -12,8 -5.2,7" fill="#111" opacity="0.4"/>
  </g>

  <!-- FIFA World Cup 2026 text arc (bottom) -->
  <path id="arc-bottom" d="M 20,150 A 80,80 0 0,0 180,150" fill="none"/>
  <text font-family="Arial, sans-serif" font-weight="900" font-size="11" fill="rgba(255,255,255,0.7)" letter-spacing="2">
    <textPath href="#arc-bottom" startOffset="12%">FIFA WORLD CUP 2026</textPath>
  </text>

  <!-- Top label -->
  <text x="100" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="10" fill="rgba(255,255,255,0.5)" letter-spacing="3">AFFORDABLE</text>
</svg>